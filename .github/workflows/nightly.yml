name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: 1
          MP_SMTP_AUTH_ALLOW_INSECURE: 1

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      CRON_SECRET: ci-test-cron-secret-min-16-chars
      DEMO_PASSWORD: Ci-demo-pass-12!
      ALLOW_PUBLIC_REGISTER: 'true'
      PUBLIC_APP_URL: https://localhost:3000
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: test
      SMTP_PASS: test
      SMTP_FROM: GymApure Test <test@gym.test>
      MAILPIT_API_URL: http://localhost:8025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Seed demo users
        run: npm run db:restore-demo

      - name: Seed checklist admin
        env:
          ADMIN_EMAIL: checklist-admin@test.local
          ADMIN_PASSWORD: ChecklistAdmin123!
          ADMIN_FULL_NAME: Checklist Admin
        run: npm run db:create-admin

      - name: Start server and run nightly suites
        env:
          NODE_ENV: production
          CHECKLIST_ADMIN_EMAIL: checklist-admin@test.local
          CHECKLIST_ADMIN_PASSWORD: ChecklistAdmin123!
        run: |
          set -e
          npm start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Server healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              tail -n 100 /tmp/server.log || true
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          npm run test:e2e
          npm run test:email-checklist
          npm run test:payments-checklist
          npm run test:chat-checklist
          npm run test:memberships-checkin
          npm run test:exchange-rate
          npm run test:trainer-shifts
          npm run test:routine-exercises
          npm run test:ux

          kill "$SERVER_PID" 2>/dev/null || true

      - name: Full-system simulation (fast)
        env:
          NODE_ENV: production
        run: npm run test:full-system -- --with-server --fast

      - name: UX evaluation manifest
        run: npm run ux:prepare -- --samples=5

      - name: Upload UX manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: ux-eval-manifest
          path: reports/ux-eval-manifest-*.json
          if-no-files-found: ignore
