name: CI

on:
  push:
    branches: [main, master, 'feat/**']
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      CRON_SECRET: ci-test-cron-secret-min-16-chars
      DEMO_PASSWORD: Ci-demo-pass-12!
      ALLOW_PUBLIC_REGISTER: 'true'
      PUBLIC_APP_URL: https://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium (Lighthouse)
        run: npx playwright install chromium

      - run: npm run lint

      - run: npm run build

      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high

      - name: Lighthouse performance budgets (login)
        run: npm run lighthouse:ci

      - name: Bundle size baseline
        run: npm run bundle:baseline

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Database health check
        run: npm run db:health

      - name: Database table audit
        run: npm run db:audit-tables

      - name: Seed demo users
        run: npm run db:restore-demo

      - name: Seed checklist admin (auth tests)
        env:
          ADMIN_EMAIL: checklist-admin@test.local
          ADMIN_PASSWORD: ChecklistAdmin123!
          ADMIN_FULL_NAME: Checklist Admin
        run: npm run db:create-admin

      - name: Integration & E2E tests
        env:
          NODE_ENV: production
          CHECKLIST_ADMIN_EMAIL: checklist-admin@test.local
          CHECKLIST_ADMIN_PASSWORD: ChecklistAdmin123!
        run: |
          set -e
          npm start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Server healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Server did not become healthy in time"
              tail -n 80 /tmp/server.log || true
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          npm run test:e2e
          npm run test:ux
          npm run test:ux:browser
          LIGHTHOUSE_AUTH_PANEL=1 DEMO_PASSWORD="${{ env.DEMO_PASSWORD }}" npm run lighthouse:ci
          kill "$SERVER_PID" 2>/dev/null || true
