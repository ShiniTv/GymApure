name: CI

on:
  push:
    branches: [main, master, 'feat/**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gym_test
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      DEMO_PASSWORD: ci-demo-pass-12
      KIOSK_API_KEY: ci-kiosk-key-min16chars
      VITE_KIOSK_KEY: ci-kiosk-key-min16chars
      NODE_ENV: development
      ALLOW_PUBLIC_REGISTER: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Seed demo users
        run: npm run db:restore-demo

      - name: Integration tests
        run: |
          npm start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server did not become healthy in time"
              exit 1
            fi
            sleep 1
          done
          npm run test:integration
          npm run test:auth-checklist
          npm run test:reception-checklist
