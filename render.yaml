# GymApure — Render Blueprint
# Docs: docs/DEPLOY.md
#
# Blueprint Sync crea caribean-gym-kv e inyecta REDIS_URL.
# Tras Sync, configura en Dashboard (obligatorio ops):
#   DATABASE_SSL_CA (PEM inline o ruta), SENTRY_DSN, VITE_SENTRY_DSN, SMTP_*
#
# Antes del primer deploy:
#   1. Crear proyecto Supabase de producción (separado de dev)
#   2. npm run deploy:release -- --run   (staging si existe) + db:migrate:prod
#   3. npm run db:create-admin
#   4. Completar secretos sync: false en Render Dashboard
#
# Tras cambios en este archivo:
#   Render Dashboard → Blueprint → Sync (crea/actualiza Key Value y env vars)

services:
  - type: web
    name: caribean-gym
    runtime: node
    plan: starter
    nodeVersion: 20
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_APP_URL
        value: https://caribean-gym.onrender.com
      - key: REQUIRE_MFA_FOR_STAFF
        value: 'false'
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: caribean-gym-kv
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ENABLE_HIBP_CHECK
        sync: false
      - key: DATABASE_SSL_CA
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: ADMIN_NOTIFY_EMAILS
        sync: false

  - type: keyvalue
    name: caribean-gym-kv
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
