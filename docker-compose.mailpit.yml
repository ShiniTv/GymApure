# SMTP de prueba local — Mailpit captura correos sin enviarlos a internet.
# Uso: npm run mailpit:up
# UI: http://localhost:8025  |  SMTP: localhost:1025
services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
